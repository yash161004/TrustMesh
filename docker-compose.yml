services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    env_file: ./backend/.env
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/trustmesh.db
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
