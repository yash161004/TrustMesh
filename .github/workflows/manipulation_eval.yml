name: Manipulation Detector Eval

on:
  pull_request:
    paths:
      - 'backend/app/trust/detectors/**'
      - 'backend/app/trust/models.py'

concurrency:
  group: manipulation-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Manipulation Holdout Benchmark
      working-directory: ./backend
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # The holdout makes live LLM calls, so it needs a real key. When the
        # GEMINI_API_KEY secret isn't configured, skip rather than hard-fail —
        # a required check that can never pass without a secret CI doesn't have
        # is broken CI. When the secret IS set, the precision/recall gate runs
        # and can fail the build as intended.
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "::warning title=Manipulation eval skipped::GEMINI_API_KEY secret not configured — skipping the live manipulation holdout. Set the repo secret to enforce the precision/recall gate on detector changes."
          exit 0
        fi
        python scripts/run_manipulation_holdout.py \
          --fail-below-precision 0.90 \
          --fail-below-recall 0.80 \
          --prompt-version "post-few-shot-expansion"

    - name: Upload Evaluation Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: eval-results
        path: docs/EVAL_RESULTS.md
        retention-days: 7
