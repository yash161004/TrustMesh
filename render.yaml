services:
  - type: web
    name: trustmesh-backend
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./trustmesh.db
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_ENFORCED
        value: "true"
      - key: CLERK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
