databases:
  - name: trustmesh-db
    plan: starter
    region: oregon
    postgresMajorVersion: "15"

services:
  - type: web
    name: trustmesh-backend
    env: docker
    rootDir: backend
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustmesh-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_ENFORCED
        value: "true"
      - key: CLERK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: cron
    name: trustmesh-ledger-sweep
    env: docker
    rootDir: backend
    schedule: "0 * * * *"
    startCommand: python scripts/sweep_ledger_integrity.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustmesh-db
          property: connectionString
      - key: TAMPER_ALERT_WEBHOOK_URL
        sync: false
